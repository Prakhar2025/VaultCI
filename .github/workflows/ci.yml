name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: vaultci_test
          POSTGRES_USER: vaultci
          POSTGRES_PASSWORD: vaultci_secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://vaultci:vaultci_secret@localhost:5432/vaultci_test
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
          GITHUB_WEBHOOK_SECRET: test_secret
          GITHUB_TOKEN: ""
          GROQ_API_KEY: ""
        run: pytest tests/ -v --tb=short
