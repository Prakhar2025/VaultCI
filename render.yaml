services:
  # ── Backend API (FastAPI on Render) ────────────────────────────────────────
  - type: web
    name: vaultci-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard
      - key: QDRANT_HOST
        sync: false          # Set manually (Qdrant Cloud URL)
      - key: QDRANT_PORT
        value: "6333"
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DEBUG
        value: "false"
    healthCheckPath: /health
